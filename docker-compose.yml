networks:
  bbdown-net:
    driver: bridge

services:
  # Telegram Bot API Server (Local Mode)
  # Handles file uploads up to 4GB — required for sending downloaded videos
  # Docs: https://github.com/tdlib/telegram-bot-api
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: bbdown-telegram-api
    restart: unless-stopped
    networks:
      - bbdown-net
    environment:
      TELEGRAM_API_ID: "${TELEGRAM_API_ID}"
      TELEGRAM_API_HASH: "${TELEGRAM_API_HASH}"
    volumes:
      - ./data/telegram-api:/var/lib/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "8081:8081"
    stop_grace_period: 10s

  # RSSHub — 用于订阅轮询，绕过 B 站 WBI 风控拿取 UP 主最新视频
  # 仅内网暴露（不映射宿主机端口）， bot 容器通过 http://rsshub:1200 访问
  rsshub:
    image: diygod/rsshub:latest
    container_name: bbdown-rsshub
    restart: unless-stopped
    networks:
      - bbdown-net
    environment:
      - NODE_ENV=production
      # 禁用内置首页和健康检查页面（可选，减少暴露面积）
      - DISALLOW_ROBOT=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:1200/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # 内部网络不映射宿主机端口。若需宿主机直接访问调试，可启用下方注释:
    # ports:
    #   - "1200:1200"

  # BBDown Telegram Bot
  bbdown-bot:
    build:
      context: .
    container_name: bbdown-bot
    restart: unless-stopped
    networks:
      - bbdown-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      telegram-api:
        condition: service_healthy
      rsshub:
        condition: service_healthy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - API_URL=http://telegram-api:8081
      - BBDOWN_PATH=/usr/local/bin/BBDown
      - RSSHUB_BASE_URL=http://rsshub:1200
      # DATA_DIR auto-resolves to /app/data (project-root relative), no need to set here
    volumes:
      - ./data/bot:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
